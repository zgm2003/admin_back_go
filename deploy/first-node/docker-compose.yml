name: admin-go-first-node

services:
  admin-api:
    image: admin-go-backend:local
    build:
      context: ${ADMIN_BACK_GO_DIR:-/www/project/admin_back_go}
      dockerfile: Dockerfile
    command: ["/app/admin-api"]
    restart: unless-stopped
    env_file:
      - ${ADMIN_GO_ENV_FILE:-./admin-go.env}
    ports:
      - "${ADMIN_API_HOST_BIND:-127.0.0.1}:${ADMIN_API_HOST_PORT:-8080}:8080"
    volumes:
      - ${ADMIN_GO_RUNTIME_DIR:-/www/docker/admin-go/runtime}:/app/runtime
      - ${ADMIN_GO_EXPORTS_DIR:-/www/docker/admin-go/exports}:/app/exports
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  admin-worker:
    image: admin-go-backend:local
    build:
      context: ${ADMIN_BACK_GO_DIR:-/www/project/admin_back_go}
      dockerfile: Dockerfile
    command: ["/app/admin-worker"]
    restart: unless-stopped
    env_file:
      - ${ADMIN_GO_ENV_FILE:-./admin-go.env}
    volumes:
      - ${ADMIN_GO_RUNTIME_DIR:-/www/docker/admin-go/runtime}:/app/runtime
      - ${ADMIN_GO_EXPORTS_DIR:-/www/docker/admin-go/exports}:/app/exports
    depends_on:
      admin-api:
        condition: service_started
